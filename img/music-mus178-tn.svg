<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520" viewBox="0 0 400 520">
  <!-- Paper background -->
  <rect width="400" height="520" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <!-- Header line -->
  <line x1="20" y1="40" x2="380" y2="40" stroke="#cccccc" stroke-width="0.5"/>
  <!-- Page number top right -->
  <text x="370" y="28" font-family="Times New Roman, serif" font-size="11" fill="#555" text-anchor="end">Lorincz</text>

  <!-- Music staff lines decorative -->
  <line x1="60" y1="90" x2="340" y2="90" stroke="#aaa" stroke-width="1"/>
  <line x1="60" y1="99" x2="340" y2="99" stroke="#aaa" stroke-width="1"/>
  <line x1="60" y1="108" x2="340" y2="108" stroke="#aaa" stroke-width="1"/>
  <line x1="60" y1="117" x2="340" y2="117" stroke="#aaa" stroke-width="1"/>
  <line x1="60" y1="126" x2="340" y2="126" stroke="#aaa" stroke-width="1"/>

  <!-- Treble clef symbol (simplified) -->
  <text x="62" y="122" font-family="Times New Roman, serif" font-size="52" fill="#333">𝄞</text>

  <!-- Title -->
  <text x="200" y="185" font-family="Times New Roman, serif" font-size="26" font-weight="bold" fill="#111" text-anchor="middle">MUS 178 Final</text>

  <!-- Subtitle / description -->
  <text x="200" y="220" font-family="Times New Roman, serif" font-size="14" fill="#444" text-anchor="middle">Original Composition</text>
  <text x="200" y="242" font-family="Times New Roman, serif" font-size="12" fill="#666" text-anchor="middle">Bass Drum · Piano · Hand Clap</text>
  <text x="200" y="260" font-family="Times New Roman, serif" font-size="12" fill="#666" text-anchor="middle">Electric Bass · Alto · Violins</text>

  <!-- Second staff lines decorative -->
  <line x1="60" y1="300" x2="340" y2="300" stroke="#aaa" stroke-width="1"/>
  <line x1="60" y1="309" x2="340" y2="309" stroke="#aaa" stroke-width="1"/>
  <line x1="60" y1="318" x2="340" y2="318" stroke="#aaa" stroke-width="1"/>
  <line x1="60" y1="327" x2="340" y2="327" stroke="#aaa" stroke-width="1"/>
  <line x1="60" y1="336" x2="340" y2="336" stroke="#aaa" stroke-width="1"/>

  <!-- Author info -->
  <text x="200" y="395" font-family="Times New Roman, serif" font-size="13" fill="#333" text-anchor="middle">Tristan Lorincz</text>
  <text x="200" y="417" font-family="Times New Roman, serif" font-size="11" fill="#555" text-anchor="middle">Michigan State University</text>
  <text x="200" y="435" font-family="Times New Roman, serif" font-size="11" fill="#555" text-anchor="middle">MUS 178</text>

  <!-- Bottom line -->
  <line x1="20" y1="490" x2="380" y2="490" stroke="#cccccc" stroke-width="0.5"/>
</svg>
